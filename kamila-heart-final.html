<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kamila ♥</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Allura&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#0a0714;
    --bg-mid:#150c24;
    --bg-edge:#1d1130;
    --rose:#e7a6b3;
    --rose-bright:#f4c3cd;
    --gold:#d9b97a;
    --gold-soft:#c9ab78;
    --ivory:#f5ecdf;
    --glow:rgba(231,166,179,0.55);
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:
      radial-gradient(ellipse 80% 60% at 50% 38%, var(--bg-edge) 0%, var(--bg-mid) 45%, var(--bg-deep) 100%);
    font-family:'Cormorant Garamond', serif;
  }

  .stage{
    position:relative;
    width:100vw;
    height:100vh;
    height:100dvh;
  }

  /* ---------- starfield ---------- */
  .star{
    position:absolute;
    width:2px;
    height:2px;
    border-radius:50%;
    background:var(--ivory);
    opacity:0.15;
    animation:twinkle 4s ease-in-out infinite;
  }
  @keyframes twinkle{
    0%,100%{opacity:0.08;}
    50%{opacity:0.65;}
  }

  /* ---------- eyebrow ---------- */
  .eyebrow{
    position:absolute;
    top:7%;
    left:50%;
    transform:translateX(-50%);
    font-size:clamp(0.62rem, 1.6vw, 0.78rem);
    letter-spacing:0.42em;
    text-transform:uppercase;
    color:var(--gold-soft);
    opacity:0;
    animation:fadeDown 1.6s ease forwards 0.3s;
    text-align:center;
    white-space:nowrap;
  }
  @keyframes fadeDown{
    from{opacity:0; transform:translate(-50%,-10px);}
    to{opacity:0.7; transform:translate(-50%,0);}
  }

  /* ---------- phrase particles ---------- */
  .star-pos{
    position:absolute;
    top:0;
    left:0;
    pointer-events:none;
    white-space:nowrap;
    transition:transform .5s ease;
  }
  .phrase{
    display:inline-block;
    will-change:transform, opacity;
    font-style:italic;
    font-weight:400;
    opacity:0;
    text-shadow:0 0 6px currentColor, 0 0 14px currentColor;
    animation-name:starTwinkle;
    animation-timing-function:ease-in-out;
    animation-iteration-count:infinite;
    animation-fill-mode:backwards;
  }
  .phrase.rose{ color:var(--rose); }
  .phrase.rose-bright{ color:var(--rose-bright); }
  .phrase.gold{ color:var(--gold); }
  .phrase.ivory{ color:var(--ivory); }

  @keyframes starTwinkle{
    0%{   opacity:0;                      transform:scale(.8);  }
    8%{   opacity:var(--peak);            transform:scale(1.06);}
    16%{  opacity:calc(var(--peak)*0.3);  transform:scale(.96); }
    27%{  opacity:var(--peak);            transform:scale(1);   }
    45%{  opacity:var(--low);                                    }
    60%{  opacity:var(--peak);                                   }
    75%{  opacity:var(--low);                                    }
    90%{  opacity:var(--peak);                                   }
    100%{ opacity:var(--low);                                    }
  }

  /* ---------- constellation lines ---------- */
  .lines path{
    fill:none;
    stroke:var(--gold);
    stroke-width:0.6;
    opacity:0;
    transition:opacity 2s ease;
  }
  .lines.draw path{
    opacity:0.16;
  }

  /* ---------- name reveal ---------- */
  .name-wrap{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-58%);
    text-align:center;
    pointer-events:none;
  }
  .name{
    font-family:'Allura', cursive;
    font-size:clamp(3.2rem, 11vw, 7.5rem);
    line-height:1;
    color:var(--ivory);
    opacity:0;
    transform:scale(0.85);
    text-shadow:
      0 0 18px var(--glow),
      0 0 38px var(--glow),
      0 0 70px rgba(231,166,179,0.35);
    transition:opacity 1.6s ease, transform 1.6s cubic-bezier(.2,.7,.2,1);
  }
  .name.show{
    opacity:1;
    transform:scale(1);
    animation:breathe 4.5s ease-in-out 1.6s infinite;
  }
  @keyframes breathe{
    0%,100%{
      text-shadow:0 0 18px var(--glow), 0 0 38px var(--glow), 0 0 70px rgba(231,166,179,0.35);
    }
    50%{
      text-shadow:0 0 26px var(--glow), 0 0 54px var(--glow), 0 0 95px rgba(231,166,179,0.5);
    }
  }

  /* ---------- music control ---------- */
  .music-btn{
    position:absolute;
    bottom:5%;
    left:5%;
    width:42px;
    height:42px;
    border-radius:50%;
    border:1px solid rgba(231,166,179,0.35);
    background:rgba(255,255,255,0.02);
    color:var(--rose-bright);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    opacity:0.6;
    transition:opacity .3s ease, border-color .3s ease;
    animation:pulseInvite 2.4s ease-in-out infinite;
  }
  .music-btn:hover{
    opacity:1;
    border-color:var(--rose-bright);
  }
  .music-btn.playing{
    animation:none;
    opacity:0.85;
  }
  .music-btn svg{
    width:17px;
    height:17px;
    stroke:currentColor;
    fill:none;
    stroke-width:1.6;
    stroke-linecap:round;
    stroke-linejoin:round;
  }
  .music-btn .mute-line{
    transition:opacity .2s ease;
    opacity:1;
  }
  .music-btn.playing .mute-line{
    opacity:0;
  }
  @keyframes pulseInvite{
    0%,100%{ box-shadow:0 0 0 0 rgba(231,166,179,0.0); }
    50%{ box-shadow:0 0 0 7px rgba(231,166,179,0.12); }
  }

  /* ---------- replay control ---------- */
  .replay{
    position:absolute;
    bottom:5%;
    right:5%;
    width:42px;
    height:42px;
    border-radius:50%;
    border:1px solid rgba(217,185,122,0.35);
    background:rgba(255,255,255,0.02);
    color:var(--gold-soft);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    opacity:0.55;
    transition:opacity .3s ease, border-color .3s ease, transform .4s ease;
  }
  .replay:hover{
    opacity:1;
    border-color:var(--gold);
  }
  .replay svg{
    width:16px;
    height:16px;
    stroke:currentColor;
    fill:none;
    stroke-width:1.6;
  }
  .replay.spin svg{
    animation:spin .7s ease;
  }
  @keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(-360deg);}
  }

  @media (prefers-reduced-motion: reduce){
    .phrase, .name, .lines path{ transition-duration:0.01ms !important; animation:none !important; }
  }
</style>
</head>

  let phrases = [];
  let centerX, centerY, scale;
  let timers = [];

  function clearTimers(){
    timers.forEach(t => clearTimeout(t));
    timers = [];
  }

  // ---------- starfield (built once) ----------
  function buildStars(){
    const n = 70;
    for(let i=0;i<n;i++){
      const s = document.createElement('div');
      s.className = 'star';
      const x = Math.random()*100, y = Math.random()*100;
      s.style.left = x+'vw';
      s.style.top = y+'vh';
      const size = 1 + Math.random()*1.6;
      s.style.width = size+'px';
      s.style.height = size+'px';
      s.style.animationDuration = (2.5 + Math.random()*4)+'s';
      s.style.animationDelay = (Math.random()*4)+'s';
      stage.appendChild(s);
    }
  }

  // ---------- heart geometry ----------
  function heartMath(t){
    // classic parametric heart (math orientation, y up)
    const x = 16 * Math.pow(Math.sin(t),3);
    const y = 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
    return {x,y};
  }

  function insideHeart(x,y){
    // implicit heart, math orientation (y up), point at bottom
    const v = Math.pow(x*x + y*y - 1, 3) - x*x*y*y*y;
    return v <= 0;
  }

  function toPixel(mx,my){
    return {
      px: centerX + mx*scale,
      py: centerY - my*scale
    };
  }

  function computeGeometry(){
    const vw = window.innerWidth, vh = window.innerHeight;
    centerX = vw/2;
    centerY = vh*0.50;
    scale = Math.min(vw, vh) * 0.027; // tuned for the 16-unit wide parametric curve
  }

  function buildPoints(){
    const outline = [];
    const N_OUT = 46;
    for(let i=0;i<N_OUT;i++){
      const t = (i/N_OUT) * Math.PI * 2;
      const {x,y} = heartMath(t);
      outline.push({mx:x, my:y, t, kind:'outline'});
    }

    const fill = [];
    const N_FILL = 46;
    let attempts = 0;
    while(fill.length < N_FILL && attempts < 4000){
      attempts++;
      const fx = (Math.random()*3 - 1.5);
      const fy = (Math.random()*3 - 1.6) + 0.15;
      if(insideHeart(fx,fy)){
        // scale normalized implicit coords up to the same 16-unit space as outline
        fill.push({mx:fx*13, my:fy*13, t: Math.atan2(fy,fx)+Math.PI, kind:'fill'});
      }
    }

    return outline.concat(fill);
  }

  function buildPhraseElements(points){
    phrases.forEach(p => p.wrap.remove());
    phrases = [];

    const delays = angleDelayMap(points);
    const SWEEP = reduced ? 0 : 2200; // ms over which stars light up, sweeping around the heart

    points.forEach((pt, i) => {
      const isOutline = pt.kind === 'outline';

      const wrap = document.createElement('div');
      wrap.className = 'star-pos';
      const {px,py} = toPixel(pt.mx, pt.my);
      const rot = (Math.random()*16 - 8);
      wrap.style.transform = `translate(${px}px, ${py}px) rotate(${rot}deg)`;

      const span = document.createElement('span');
      span.className = 'phrase ' + COLORS[Math.floor(Math.random()*COLORS.length)];
      span.textContent = PHRASE;

      const fontSize = isOutline
        ? (0.62 + Math.random()*0.22)
        : (0.42 + Math.random()*0.2);
      span.style.fontSize = fontSize.toFixed(2)+'rem';

      const peak = isOutline ? (0.82 + Math.random()*0.18) : (0.4 + Math.random()*0.25);
      const low = peak * (0.22 + Math.random()*0.2);
      const dur = 5 + Math.random()*7;
      const appearDelay = (delays[i]*SWEEP + Math.random()*350) / 1000;

      span.style.setProperty('--peak', peak.toFixed(2));
      span.style.setProperty('--low', low.toFixed(2));

      if(reduced){
        span.style.animation = 'none';
        span.style.opacity = peak.toFixed(2);
      }else{
        span.style.animationDuration = dur.toFixed(2)+'s';
        span.style.animationDelay = appearDelay.toFixed(2)+'s';
      }

      wrap.appendChild(span);
      stage.appendChild(wrap);
      phrases.push({wrap, pt, i});
    });

    return SWEEP;
  }

  function angleDelayMap(points){
    // delay based on angular position for a sweeping assembly
    return points.map(pt => {
      let a = Math.atan2(pt.my, pt.mx);
      if(a < 0) a += Math.PI*2;
      return a/(Math.PI*2);
    });
  }

  function buildLines(points){
    linesSvg.innerHTML = '';
    linesSvg.classList.remove('draw');
    const outlinePts = points.filter(p => p.kind === 'outline').slice().sort((a,b)=>a.t-b.t);
    let d = '';
    outlinePts.forEach((pt,i) => {
      const {px,py} = toPixel(pt.mx, pt.my);
      d += (i===0 ? 'M' : 'L') + px.toFixed(1) + ',' + py.toFixed(1) + ' ';
    });
    d += 'Z';
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', d);
    linesSvg.appendChild(path);
  }

  function run(){
    clearTimers();
    nameEl.classList.remove('show');
    computeGeometry();
    const points = buildPoints();
    const SWEEP = buildPhraseElements(points);
    buildLines(points);

    const linesDelay = SWEEP + 900;
    timers.push(setTimeout(() => linesSvg.classList.add('draw'), reduced ? 0 : linesDelay));

    const nameDelay = SWEEP + 1700;
    timers.push(setTimeout(() => nameEl.classList.add('show'), reduced ? 200 : nameDelay));
  }

  let resizeT;
  window.addEventListener('resize', () => {
    clearTimeout(resizeT);
    resizeT = setTimeout(() => {
      computeGeometry();
      phrases.forEach(p => {
        const {px,py} = toPixel(p.pt.mx, p.pt.my);
        const m = /rotate\(([-0-9.]+)deg\)/.exec(p.wrap.style.transform);
        const rot = m ? m[1] : 0;
        p.wrap.style.transform = `translate(${px}px, ${py}px) rotate(${rot}deg)`;
      });
      buildLines(phrases.map(p => p.pt));
      linesSvg.classList.add('draw');
    }, 200);
  });

  replayBtn.addEventListener('click', () => {
    replayBtn.classList.add('spin');
    setTimeout(() => replayBtn.classList.remove('spin'), 700);
    if(musicOn){ audio.currentTime = 0; }
    run();
  });

  // ---------- background music ----------
  const audio = document.getElementById('bgm');
  const musicBtn = document.getElementById('musicBtn');
  let musicOn = false;

  function setMusicState(playing){
    musicOn = playing;
    musicBtn.classList.toggle('playing', playing);
    musicBtn.setAttribute('aria-label', playing ? 'Выключить музыку' : 'Включить музыку');
  }

  function startMusic(){
    audio.volume = 0.55;
    audio.play().then(() => setMusicState(true)).catch(() => setMusicState(false));
  }

  // first tap/click anywhere starts the music, in sync with the page coming alive
  function firstGesture(){
    startMusic();
  }
  document.addEventListener('click', firstGesture, { once:true });
  document.addEventListener('touchstart', firstGesture, { once:true });

  musicBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if(musicOn){
      audio.pause();
      setMusicState(false);
    }else{
      startMusic();
    }
  });

  buildStars();
  computeGeometry();
  run();
})();
</script>

</body>
</html>
